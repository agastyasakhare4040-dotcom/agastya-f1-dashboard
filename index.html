<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Agastya's Pit Wall</title>

<style>
body {
  margin: 0;
  background: #050b18;
  color: white;
  font-family: Arial, sans-serif;
}

header {
  padding: 30px;
  border-bottom: 2px solid #0d47ff;
}

h1 {
  margin: 0;
  font-size: 54px;
  color: #2f80ff;
}

.hero {
  padding: 40px;
}

.card {
  background: linear-gradient(145deg,#081224,#0f2450);
  border: 1px solid #1b4fff;
  border-radius: 18px;
  padding: 24px;
  margin-bottom: 25px;
  box-shadow: 0 0 25px rgba(47,128,255,0.25);
}

.section-title {
  color: #59a8ff;
  margin-bottom: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(240px,1fr));
  gap: 20px;
}

.countdown {
  display: flex;
  gap: 20px;
  margin-top: 20px;
}

.count-box {
  background: #12306f;
  padding: 18px;
  border-radius: 12px;
  min-width: 90px;
  text-align: center;
}

.big {
  font-size: 34px;
  font-weight: bold;
}

.standing-row {
  display: flex;
  justify-content: space-between;
  padding: 12px 0;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

.news-item {
  padding: 12px 0;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
</style>
</head>
<body>

<header>
  <h1>Agastya's Pit Wall</h1>
</html>
